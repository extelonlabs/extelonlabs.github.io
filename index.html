<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RimWorld Trait Dice Game</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--border:#334155;--shadow:0 10px 30px rgba(0,0,0,.35);--radius:18px}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui;background:linear-gradient(160deg,#020617,#0f172a 45%,#111827);color:var(--text);min-height:100vh}
.wrap{max-width:1200px;margin:0 auto;padding:24px}
.hero,.panel,.trait-card{background:rgba(17,24,39,.92);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{padding:28px;margin-bottom:20px}
h1{margin:0 0 8px;font-size:clamp(2rem,4vw,3rem)}
.subtitle,.lead{color:var(--muted);line-height:1.6}
.toolbar{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px}
button{border:0;border-radius:999px;padding:12px 18px;font-weight:700;cursor:pointer;color:white}
.primary{background:linear-gradient(135deg,#16a34a,#22c55e)}
.secondary{background:linear-gradient(135deg,#0284c7,#38bdf8)}
.ghost{background:linear-gradient(135deg,#475569,#64748b)}
.danger{background:linear-gradient(135deg,#dc2626,#ef4444)}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.panel{padding:20px}
.traits-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.trait-card{padding:18px;background:linear-gradient(180deg,rgba(31,41,55,.9),rgba(17,24,39,.95))}
.pill{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:.8rem;font-weight:800;margin-bottom:10px}
.good{background:rgba(34,197,94,.15);color:#86efac}
.neutral{background:rgba(148,163,184,.15);color:#cbd5e1}
.bad{background:rgba(239,68,68,.15);color:#fca5a5}
.trait-name{font-size:1.2rem;font-weight:800}
.settings-grid{display:flex;gap:20px;margin-top:10px}
.settings-grid label{font-size:.9rem;color:var(--muted)}
.settings-grid input{width:60px;padding:6px;border-radius:6px;border:1px solid var(--border);background:#020617;color:white}
.chosen-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.chosen-summary-card{border:1px solid var(--border);border-radius:16px;padding:16px;background:rgba(15,23,42,.5)}
.chosen-line{color:var(--muted);line-height:1.6;margin-top:6px}
.history-list{display:grid;gap:12px;max-height:620px;overflow:auto}
.history-item{border:1px solid var(--border);border-radius:16px;padding:14px;background:rgba(15,23,42,.55)}
.history-tags{display:flex;flex-wrap:wrap;gap:8px}
.history-tag{font-size:.82rem;padding:6px 10px;border-radius:999px;background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.16)}
.empty{color:var(--muted);border:1px dashed var(--border);border-radius:16px;padding:18px;text-align:center}
@media(max-width:920px){.grid{grid-template-columns:1fr}.traits-grid{grid-template-columns:1fr}.chosen-summary-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">

<section class="hero">
<h1>RimWorld Trait Dice Game</h1>
<p class="subtitle">Choose how many Good, Neutral, or Bad traits you want to roll.</p>

<div class="settings-grid">
<label>Good<br><input id="goodCount" type="number" min="0" value="1"></label>
<label>Neutral<br><input id="neutralCount" type="number" min="0" value="1"></label>
<label>Bad<br><input id="badCount" type="number" min="0" value="1"></label>
</div>

<div class="toolbar">
<button class="primary" id="rollBtn">🎲 Roll Traits</button>
<button class="secondary" id="saveBtn">💾 Save Roll</button>
<button class="ghost" id="clearBtn">🧹 Clear</button>
<button class="danger" id="resetBtn">♻ Reset</button>
</div>
</section>

<div class="grid">
<section class="panel">
<h2>Current roll</h2>
<div class="traits-grid" id="currentRoll"></div>
</section>

<aside class="panel">
<h2>Saved rolls</h2>
<div class="history-list" id="historyList"></div>
</aside>
</div>

<section class="panel" style="margin-top:20px;">
<h2>Chosen traits details</h2>
<div id="chosenTraitsSummary"></div>
</section>

</div>

<script>

function makeTrait(name,category){return{name,category}}

const TRAITS={
 good:[makeTrait('Tough','Good'),makeTrait('Nimble','Good'),makeTrait('Industrious','Good'),makeTrait('Hard worker','Good'),makeTrait('Optimist','Good')],
 neutral:[makeTrait('Night owl','Neutral'),makeTrait('Kind','Neutral'),makeTrait('Pretty','Neutral'),makeTrait('Masochist','Neutral'),makeTrait('Trigger happy','Neutral')],
 bad:[makeTrait('Lazy','Bad'),makeTrait('Slow poke','Bad'),makeTrait('Nervous','Bad'),makeTrait('Pessimist','Bad'),makeTrait('Pyromaniac','Bad')]
}

let currentRoll=null
let savedRolls=[]

const rollEl=document.getElementById('currentRoll')
const historyEl=document.getElementById('historyList')
const summaryEl=document.getElementById('chosenTraitsSummary')

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function pickRandom(pool,count){return shuffle([...pool]).slice(0,count)}

function generateRoll(){

const goodCount=parseInt(document.getElementById('goodCount').value)||0
const neutralCount=parseInt(document.getElementById('neutralCount').value)||0
const badCount=parseInt(document.getElementById('badCount').value)||0

const good=pickRandom(TRAITS.good,goodCount)
const neutral=pickRandom(TRAITS.neutral,neutralCount)
const bad=pickRandom(TRAITS.bad,badCount)

return[...good,...neutral,...bad]
}

function categoryClass(c){return c.toLowerCase()}

function renderRoll(){

if(!currentRoll||!currentRoll.length){
rollEl.innerHTML='<div class="empty">Roll traits</div>'
summaryEl.innerHTML=''
return
}

rollEl.innerHTML=currentRoll.map(t=>`
<article class="trait-card">
<div class="pill ${categoryClass(t.category)}">${t.category}</div>
<div class="trait-name">${t.name}</div>
</article>`).join('')

summaryEl.innerHTML=`<div class="chosen-summary-grid">${currentRoll.map(t=>`
<div class="chosen-summary-card">
<strong>${t.name}</strong>
<div class="chosen-line">Category: ${t.category}</div>
</div>`).join('')}</div>`
}

function renderHistory(){
if(!savedRolls.length){historyEl.innerHTML='<div class="empty">No saves</div>';return}

historyEl.innerHTML=savedRolls.map(r=>`<div class="history-item"><div class="history-tags">${r.map(t=>`<span class="history-tag">${t.name}</span>`).join('')}</div></div>`).join('')
}

rollBtn.onclick=()=>{currentRoll=generateRoll();renderRoll()}

saveBtn.onclick=()=>{
if(!currentRoll)return
savedRolls.push(currentRoll)
renderHistory()
}

clearBtn.onclick=()=>{currentRoll=null;renderRoll()}

resetBtn.onclick=()=>{currentRoll=null;savedRolls=[];renderRoll();renderHistory()}

renderRoll()
renderHistory()

</script>
</body>
</html>
